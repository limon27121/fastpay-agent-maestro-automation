appId: com.fastpay.agent
tags:
  - smoke
  - regression
  - P0
  - Functional

---
- launchApp
# Step 2: Call the shared helper script and inject the invalid credentials
- runFlow:
    file: "../../flows/login_helper.yaml" # Adjust relative path to point to your login_helper location
    env:
      User: "7507507501" # The invalid phone number
      Password: "Password100@11" # The correct password

# Step 3: Assert the error dialog that pops up for an invalid number
- assertVisible:
    id: "dialogCardView"
- tapOn: "TRY AGAIN"
