# 5. Handle the Password Input safely
- tapOn:
    id: "customEditTextView"
    index: 1
- eraseText: 20
- inputText: ${Password}

# 6. Eye icon toggle to mask/unmask security characters
- tapOn:
    id: "customEditTextEndImageView"
    index: 1
- assertVisible:
    id: "customEditTextView"
    index: 1
- tapOn:
    id: "customEditTextEndImageView"
    index: 1

# 7. Submit transaction details
- tapOn:
    id: "loginBtn"
