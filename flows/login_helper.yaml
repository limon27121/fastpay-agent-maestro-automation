appId: com.fastpay.business
---
# CONDITION 1: Check if the field contains ANY phone number (using regex for digits and spaces)

- runFlow:
    when:
      visible:
        text: ".*[6].*" # Matches any text containing numbers
    commands:
      - longPressOn:
          id: customEditTextView
      - tapOn: Cut
      - inputText: ${User}

# CONDITION 2: If no numbers are found (field is completely empty or just shows a text hint)
- runFlow:
    when:
      visible:
        text: Mobile Number
    commands:
      - tapOn: "Mobile Number"
      - inputText: ${User}

