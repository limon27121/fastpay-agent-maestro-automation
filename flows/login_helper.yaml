appId: com.fastpay.business
# env:
#     User: "6600000185"             # Default User credential
#     Password: "Password100@11"

---
# CONDITION 1: Check if the field contains ANY phone number (using regex for digits and spaces)
- runFlow:
    when:
      visible:
        text: ".*[0-9].*" # Matches any text containing numbers
    commands:
      - longPressOn: Mobile Number
      - tapOn: Cut
      - inputText: ${User}

# CONDITION 2: If no numbers are found (field is completely empty or just shows a text hint)
- runFlow:
    when:
      notVisible:
        text: ".*[0-9].*"
    commands:
      - tapOn: "Mobile Number"
      - inputText: ${User}

# Proceed with the rest of your password and login steps
- tapOn:
    id: customEditTextView
    index: 1
- eraseText
- inputText: ${Password}
- tapOn:
    id: customEditTextEndImageView
    index: 1
- assertVisible:
    id: customEditTextView
    index: 1
- tapOn:
    id: customEditTextEndImageView
    index: 1
- tapOn:
    id: loginBtn
