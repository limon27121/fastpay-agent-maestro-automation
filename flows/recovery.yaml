appId: com.fastpay.business
---
- stopApp
- tapOn: FastpayAgent
- waitForAnimationToEnd

# Try go home if logged in
- runFlow:
    file: "../flows/helpers/go_home.yaml"
    optional: true

- waitForAnimationToEnd

# Try logout if on home screen
- runFlow:
    file: "../flows/helpers/logout.yaml"
    optional: true

- waitForAnimationToEnd

# ✅ Correct — stop the agent app explicitly
- stopApp:
    appId: com.fastpay.agent
